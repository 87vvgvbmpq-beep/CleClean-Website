backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "site_content"
    label: "Site Content"
    files:
      - name: "services"
        label: "Services and Packages"
        file: "content/services.json"
        format: "json"
        fields:
          - label: "Services and packages"
            name: "services"
            widget: "list"
            summary: "{{fields.name}} - {{fields.price}}"
            fields:
              - label: "Service name"
                name: "name"
                widget: "string"
              - label: "Price"
                name: "price"
                widget: "string"
                required: false
              - label: "Duration"
                name: "duration"
                widget: "string"
                required: false
              - label: "Short description"
                name: "shortDescription"
                widget: "text"
              - label: "Full description"
                name: "fullDescription"
                widget: "text"
              - label: "Included features"
                name: "features"
                widget: "list"
                field:
                  label: "Feature"
                  name: "feature"
                  widget: "string"
              - label: "Image"
                name: "image"
                widget: "image"
                required: false
              - label: "Active"
                name: "active"
                widget: "boolean"
                default: true
      - name: "appointment_booking"
        label: "Availability Calendar"
        file: "content/booking.json"
        format: "json"
        fields:
          - label: "Google Appointment Schedule URL"
            name: "appointmentScheduleUrl"
            widget: "string"
            required: false
            hint: "Paste the public Google Calendar Appointment Schedule link after co-host availability checking is enabled. The website shows this above the request form."
          - label: "Embed availability calendar"
            name: "embed"
            widget: "boolean"
            default: true
            hint: "When enabled, the availability calendar is embedded in the site. The direct link button stays available either way."
          - label: "Heading"
            name: "heading"
            widget: "string"
          - label: "Description"
            name: "description"
            widget: "text"
          - label: "Button label"
            name: "buttonLabel"
            widget: "string"
          - label: "Status text"
            name: "statusText"
            widget: "text"
